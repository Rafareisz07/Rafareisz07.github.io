<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solarimetria - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/paho-mqtt@1.1.0/paho-mqtt-min.js"></script>
</head>
<body>
  <!-- Navegação de Tabs -->
  <div class="tabs">
    <button class="tab" onclick="openTab('status')">Status Sensores</button>
    <button class="tab" onclick="openTab('posicao')">Posição Solar</button>
    <button class="tab" onclick="openTab('luminosidade')">Luminosidade</button>
  </div>

  <!-- Tab Posição Solar -->
  <div id="posicao" class="tab-content active">
    <div class="card">
      <h3>Localização</h3>
      <p>Latitude: <span id="latitude">0.0000</span></p>
      <p>Longitude: <span id="longitude">0.0000</span></p>
    </div>
    <div class="card">
      <h3>Ângulos Solares</h3>
      <p>Zenital: <span id="zenital">0°</span></p>
      <p>Azimutal: <span id="azimutal">0°</span></p>
    </div>
  </div>

  <!-- Tab Luminosidade -->
  <div id="luminosidade" class="tab-content">
    <div class="card gauge">
      <h3>Luminosidade Atual</h3>
      <div class="gauge-value" id="luminosidadeAtual">0</div>
    </div>
    <div class="card chart">
      <canvas id="graficoLuminosidade" width="400" height="200"></canvas>
    </div>
  </div>

  <!-- Tab Status Sensores -->
  <div id="status" class="tab-content">
    <div class="status-card" id="status-bussola">
      <h4>Bússola: <span class="status">OFF</span></h4>
    </div>
    <div class="status-card" id="status-giroscopio">
      <h4>Giroscópio: <span class="status">OFF</span></h4>
    </div>
  </div>

  <!-- Botão de Teste -->
  <button onclick="testPublish()" class="btn-test">▶️ Enviar Teste MQTT</button>

  <!-- Script Integrado -->
  <script>
    // Inicializa o Chart.js
    const ctx = document.getElementById('graficoLuminosidade').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{ label: 'Luminosidade', data: [], borderColor: '#3498db' }]
      },
      options: {
        scales: { x: { display: true }, y: { beginAtZero: true } }
      }
    });

    // Configuração e Conexão MQTT
    const client = new Paho.MQTT.Client(
      'test.mosquitto.org', 8081, '/mqtt', 'clientId-' + Math.random()
    );
    client.connect({
      useSSL: true,
      onSuccess: () => { console.log('Conectado ao broker MQTT!'); client.subscribe('careca'); },
      onFailure: err => console.error('Falha ao conectar:', err.errorMessage)
    });

    // Publicação de Mensagem de Teste
    function testPublish() {
      const demo = {
        Latitude: -23.55, Longitude: -46.64,
        zenital: 60.0, azimute: 132.0,
        luminosidade: Math.floor(Math.random() * 10000)
      };
      const msg = new Paho.MQTT.Message(JSON.stringify(demo));
      msg.destinationName = 'careca';
      client.send(msg);
      console.log('Mensagem de teste enviada:', demo);
    }

    // Recebimento e Processamento de Mensagem
    client.onMessageArrived = message => {
      const data = JSON.parse(message.payloadString);
      console.log('MQTT chegou:', data);

      // Atualiza valores no DOM
      document.getElementById('latitude').textContent = data.Latitude.toFixed(4);
      document.getElementById('longitude').textContent = data.Longitude.toFixed(4);
      document.getElementById('zenital').textContent = `${data.zenital.toFixed(1)}°`;
      document.getElementById('azimutal').textContent = `${data.azimute.toFixed(1)}°`;
      document.getElementById('luminosidadeAtual').textContent = data.luminosidade;

      // Atualiza gráfico
      chart.data.labels.push(new Date().toLocaleTimeString());
      chart.data.datasets[0].data.push(data.luminosidade);
      chart.update();
    };

    // Controle de Abas
    function openTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
    }
  </script>
</body>
</html>
